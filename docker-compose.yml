version: '3.8'

services:
  api:
    build: .
    container_name: agentic_support_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the DB URL in .env to point to the docker network database
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentic_support
      # Ensure HuggingFace models are cached in a volume
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started

  db:
    image: postgres:15-alpine
    container_name: agentic_support_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentic_support
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentic_support_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
  hf_cache:
